<script>
// Función para rastrear clics
function trackEvent(eventName, eventParams) {
  gtag('event', eventName, eventParams);
}

// Rastrear clics en botones importantes
document.addEventListener('DOMContentLoaded', function() {
  
  // Clic en "Explorar Carreras"
  var btnCarreras = document.querySelectorAll('[href*="carreras"], .btn-naranja-hero');
  btnCarreras.forEach(function(btn) {
    btn.addEventListener('click', function() {
      trackEvent('click_explorar_carreras', {
        'button_location': 'hero_principal'
      });
    });
  });

  // Clic en "Iniciar Admisión"
  var btnAdmision = document.querySelectorAll('[href*="admision"], .btn-outline-hero');
  btnAdmision.forEach(function(btn) {
    btn.addEventListener('click', function() {
      trackEvent('click_iniciar_admision', {
        'button_location': 'hero_principal'
      });
    });
  });

  // Clic en WhatsApp
  var btnWhatsapp = document.querySelector('.whatsapp-float');
  if(btnWhatsapp) {
    btnWhatsapp.addEventListener('click', function() {
      trackEvent('click_whatsapp', {
        'contact_method': 'floating_button'
      });
    });
  }

  // Clic en carreras específicas
  var cardsCarreras = document.querySelectorAll('.card-programa, .card-carrera');
  cardsCarreras.forEach(function(card) {
    card.addEventListener('click', function() {
      var carrera = this.querySelector('h3') ? this.querySelector('h3').textContent : 'Sin nombre';
      trackEvent('click_carrera', {
        'carrera_nombre': carrera
      });
    });
  });

  // Descarga de PDFs (Mapas curriculares)
  var pdfLinks = document.querySelectorAll('a[href$=".pdf"]');
  pdfLinks.forEach(function(link) {
    link.addEventListener('click', function() {
      var pdfName = this.getAttribute('href').split('/').pop();
      trackEvent('download_pdf', {
        'file_name': pdfName
      });
    });
  });

  // Envío de formulario de admisión
  var formAdmision = document.querySelector('.form-registro');
  if(formAdmision) {
    formAdmision.addEventListener('submit', function() {
      trackEvent('form_submit_admision', {
        'form_type': 'pre_registro'
      });
    });
  }

});
</script>
