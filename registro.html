<script async src="https://www.googletagmanager.com/gtag/js?id=G-K0WS06SPXY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-K0WS06SPXY');
</script>


<script>
// Función para rastrear clics
function trackEvent(eventName, eventParams) {
  gtag('event', eventName, eventParams);
}

// Rastrear clics en botones importantes
document.addEventListener('DOMContentLoaded', function() {
  
  // Clic en "Explorar Carreras"
  var btnCarreras = document.querySelectorAll('[href*="carreras"], .btn-naranja-hero');
  btnCarreras.forEach(function(btn) {
    btn.addEventListener('click', function() {
      trackEvent('click_explorar_carreras', {
        'button_location': 'hero_principal'
      });
    });
  });

  // Clic en "Iniciar Admisión"
  var btnAdmision = document.querySelectorAll('[href*="admision"], .btn-outline-hero');
  btnAdmision.forEach(function(btn) {
    btn.addEventListener('click', function() {
      trackEvent('click_iniciar_admision', {
        'button_location': 'hero_principal'
      });
    });
  });

  // Clic en WhatsApp
  var btnWhatsapp = document.querySelector('.whatsapp-float');
  if(btnWhatsapp) {
    btnWhatsapp.addEventListener('click', function() {
      trackEvent('click_whatsapp', {
        'contact_method': 'floating_button'
      });
    });
  }

  // Clic en carreras específicas
  var cardsCarreras = document.querySelectorAll('.card-programa, .card-carrera');
  cardsCarreras.forEach(function(card) {
    card.addEventListener('click', function() {
      var carrera = this.querySelector('h3') ? this.querySelector('h3').textContent : 'Sin nombre';
      trackEvent('click_carrera', {
        'carrera_nombre': carrera
      });
    });
  });

  // Descarga de PDFs (Mapas curriculares)
  var pdfLinks = document.querySelectorAll('a[href$=".pdf"]');
  pdfLinks.forEach(function(link) {
    link.addEventListener('click', function() {
      var pdfName = this.getAttribute('href').split('/').pop();
      trackEvent('download_pdf', {
        'file_name': pdfName
      });
    });
  });

  // Envío de formulario de admisión
  var formAdmision = document.querySelector('.form-registro');
  if(formAdmision) {
    formAdmision.addEventListener('submit', function() {
      trackEvent('form_submit_admision', {
        'form_type': 'pre_registro'
      });
    });
  }

});
</script>

<body>

<div id="header-container"></div>

<!-- =========================
        CONTENIDO PRINCIPAL
========================= -->
<main>

<section class="formulario-admision">

<h1>Pre-Registro de Aspirantes</h1>

<p class="texto-promo">
Completa el siguiente formulario para iniciar tu proceso de admisión en la
<strong>Universidad Politécnica Mesoamericana</strong>.
Nuestro equipo se pondrá en contacto contigo para brindarte información
sobre el proceso de inscripción.
</p>


<!-- =========================
        FORMULARIO
========================= -->

<form action="https://formspree.io/f/mojaqlzv" method="POST" class="form-registro">


<label for="nombre">Nombre completo *</label>
<input 
type="text" 
id="nombre" 
name="nombre" 
placeholder="Escribe tu nombre completo"
required
minlength="5"
>


<label for="email">Correo electrónico *</label>
<input 
type="email" 
id="email" 
name="email" 
placeholder="ejemplo@email.com"
required
>


<label for="telefono">Teléfono *</label>
<input 
type="tel" 
id="telefono" 
name="telefono"
placeholder="10 dígitos"
pattern="[0-9]{10}"
required
>

<label for="carrera">Carrera de interés *</label>

<select id="carrera" name="carrera" required>

<option value="" disabled selected>Seleccione una opción</option>

<option value="itid">
Ingeniería en Tecnologías de la Información e Innovación Digital
</option>

<option value="imrn">
Ingeniería en Manejo de Recursos Naturales
</option>

<option value="ip">
Ingeniería Petrolera
</option>

<option value="lgdt">
Licenciatura en Gestión y Desarrollo Turístico
</option>

<option value="lcia">
Licenciatura en Comercio Internacional y Aduanas
</option>

</select>


<label for="mensaje">Mensaje o duda (opcional)</label>
<textarea 
id="mensaje"
name="mensaje"
rows="4"
placeholder="Escribe aquí alguna duda o comentario...">
</textarea>


<!-- consentimiento -->

<label class="checkbox">

<input type="checkbox" required>

Acepto que mis datos sean utilizados para fines informativos relacionados
con el proceso de admisión de la Universidad Politécnica Mesoamericana.

</label>


<br>

<button type="submit" class="btn">
Enviar Pre-Registro
</button>

</form>

</section>

</main>



<div id="footer-container"></div>


<script src="faq.js"></script>
<script src="js/cargar-componentes.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
